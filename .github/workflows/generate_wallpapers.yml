name: Generate Wallpapers JSON

on:
  push:
    paths:
      - 'images/**' # Hanya berjalan jika ada perubahan di dalam folder images
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

jobs:
  generate-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Run JSON Generator Script
        run: python scripts/generate_json.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add wallpapers.json
          # Commit hanya jika ada perubahan pada file json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate wallpapers.json [skip ci]"
          git push
